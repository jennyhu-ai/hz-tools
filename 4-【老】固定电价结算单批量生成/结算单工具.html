<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  padding-bottom: 40px;
}
.header {
  background: linear-gradient(135deg, #1a73e8, #1557b0);
  color: #fff;
  padding: 20px 30px;
  text-align: center;
}
.header h1 { font-size: 22px; margin-bottom: 4px; }

.upload-zone {
  margin: 24px auto;
  max-width: 600px;
  background: #fff;
  border-radius: 12px;

  text-align: center;

  cursor: pointer;
  transition: all 0.2s;
}

.upload-zone input { display: none; }
.stamp-zone {

  background: #fffbe6;

  padding: 16px 20px;

}

.stamp-zone input { display: none; }
.hidden { display: none !important; }

/* 列表区 */
.list-area {
  max-width: 1000px;
  margin: 20px auto;
  padding: 0 20px;
}
.list-toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}
.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-outline { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
.btn-outline:hover { background: #f0f5ff; }
.btn-success { background: #0d904f; color: #fff; }

.stamp-badge { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; }
.stamp-missing { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #fce4e4; color: #c62828; }

/* 表格 */
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;

}
.data-table td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid #f0f0f0;
}
.data-table tr:hover td { background: #fafbfc; }
.data-table .actions { white-space: nowrap; }
.btn-sm {
  padding: 4px 12px;
  border: 1px solid #d0d5dd;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  background: #fff;
  margin-right: 4px;
  transition: all 0.15s;
}
.btn-sm:hover { background: #f0f5ff; border-color: #1a73e8; color: #1a73e8; }
.btn-sm.danger:hover { background: #fff0f0; border-color: #d32f2f; color: #d32f2f; }

/* 模态框 */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal {
  background: #fff;
  border-radius: 12px;

  max-width: 900px;
  max-height: 90vh;

  border-bottom: 1px solid #e0e0e0;

/* 空状态 */

<body>

  <h1>光伏电费结算单生成工具</h1>

<script>
// ==================== 中文大写 ====================
function numToCnUpper(num) {
  const cnUnits = ["", "拾", "佰", "仟", "万", "拾", "佰", "仟", "亿"];
  const cnNums = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
  let yuan = Math.floor(num);
  let jiao = Math.round((num - yuan) * 10);
  let fen = Math.round((num - yuan - jiao / 10) * 100);
  if (jiao === 10) { yuan += 1; jiao = 0; }
  if (fen === 10) { jiao += 1; fen = 0; }
  let yuanStr = "";
  if (yuan === 0) {
    yuanStr = "零";
  } else {
    let digits = [];
    let unitIdx = 0, n = yuan;
    while (n > 0) {
      let digit = n % 10;
      if (digit === 0) { if (digits.length && digits[digits.length-1] !== "零") digits.push("零"); }
      else { digits.push(cnNums[digit] + cnUnits[unitIdx]); }
      n = Math.floor(n / 10); unitIdx++;
    }
    while (digits.length && digits[digits.length-1] === "零") digits.pop();
    yuanStr = digits.reverse().join("");
    if (yuanStr.endsWith("零")) yuanStr = yuanStr.slice(0, -1);
    if (!yuanStr) yuanStr = "零";
  }
  let result = yuanStr + "元";
  if (jiao === 0 && fen === 0) { result += "整"; }
  else { result += jiao > 0 ? cnNums[jiao] + "角" : "零"; if (fen > 0) result += cnNums[fen] + "分"; }
  return result;
}

// ==================== 日期解析 ====================
function parseDate(val) {
  if (val === null || val === undefined || val === "") return null;
  // Excel 日期序列号
  if (typeof val === "number" || /^\d{4,6}$/.test(String(val))) {
    const d = new Date((Number(val) - 25569) * 86400 * 1000);
    if (!isNaN(d.getTime())) return d;
  }
  if (typeof val === "string") {
    // 中文日期格式 "2026年04月" / "2026年4月1日"
    const m1 = val.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if (m1) return new Date(+m1[1], +m1[2]-1, +m1[3]);
    const m2 = val.match(/(\d{4})年(\d{1,2})月/);
    if (m2) return new Date(+m2[1], +m2[2]-1, 1);
  }
  const d = new Date(val);
  return !isNaN(d.getTime()) ? d : null;
}
function formatPeriod(val) { const d = parseDate(val); return d ? d.getFullYear() + "年" + (d.getMonth()+1).toString().padStart(2,"0") + "月" : String(val||""); }
function formatDate(val) { const d = parseDate(val); return d ? d.getFullYear() + "年" + (d.getMonth()+1).toString().padStart(2,"0") + "月" + d.getDate().toString().padStart(2,"0") + "日" : String(val||""); }

// ==================== 印章管理 ====================
let stampFiles = {};
let neededStamps = [];

function handleStampFolder(e) {
  const files = e.target.files;
  if (!files || !files.length) return;
  Array.from(files).forEach(function(file) {
    if (!file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = function(ev) { stampFiles[file.name] = ev.target.result; updateStampStatus(); renderList(); };
    reader.readAsDataURL(file);
  });
}
function getStampHtml(path) {
  const fname = String(path||"").replace(/\\/g,"/").split("/").pop();
  if (!fname || !stampFiles[fname]) return "";
  return '<div style="position:relative;display:inline-block;height:40px;">' +
    '<img src="'+stampFiles[fname]+'" style="width:200px;height:200px;opacity:0.85;position:absolute;top:-100px;left:50px;" />' +
    '</div>';
}
function updateStampStatus() {
  const f = neededStamps.filter(function(n){return stampFiles[n];}).length;
  document.getElementById("stampStatus").innerHTML = neededStamps.length === 0 ? "" :
    (f === neededStamps.length ? '<span class="stamp-badge">印章全部匹配</span>' : '<span class="stamp-missing">印章 '+f+'/'+neededStamps.length+'</span>');
}

// ==================== Excel解析 ====================
let allRows = []; // [{headers, row, html}]

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: "array", cellDates: true });
    allRows = [];
    neededStamps = [];
    const seen = {};
    wb.SheetNames.forEach(function(name) {
      const ws = wb.Sheets[name];
      const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      if (data.length < 2) return;
      const headers = data[0];
      const stampCol = headers.indexOf("印章图片");
      for (let i = 1; i < data.length; i++) {
        const row = data[i];
        if (!row || (row[0] === undefined && row[0] !== 0)) continue;
        // 收集需要的印章
        if (stampCol >= 0) {
          const fname = String(row[stampCol]||"").replace(/\\/g,"/").split("/").pop();
          if (fname && !seen[fname]) { neededStamps.push(fname); seen[fname] = true; }
        }
        allRows.push({ headers: headers, row: row });
      }
    });

    document.getElementById("uploadZone").style.border = "2px solid #0d904f";
    document.getElementById("uploadZone").querySelector(".title").textContent = "点击重新上传 Excel（当前：" + file.name + "）";
    document.getElementById("listArea").classList.remove("hidden");
    if (neededStamps.length > 0) {
      document.getElementById("stampZone").classList.remove("hidden");
      document.getElementById("stampHint").textContent = "需要：" + neededStamps.join("、");
    }
    updateStampStatus();
    currentPage = 1;
    renderList();
    var now = new Date();
    document.getElementById("dataInfo").textContent = "已加载 " + allRows.length + " 条记录 | " + now.toLocaleTimeString("zh-CN");
  };
  reader.readAsArrayBuffer(file);
  // 清空input，确保再次选择同名文件时也能触发change事件
  var fileInput = document.getElementById("fileInput");
  if (fileInput) fileInput.value = "";
}

// ==================== 生成HTML ====================
function buildHtml(row, headers) {
  function resolveCellRef(ref) {
    ref = ref.trim().toUpperCase();
    const m = ref.match(/^([A-Z]+)(\d+)$/);
    if (!m) return NaN;
    let col = 0;
    for (let i = 0; i < m[1].length; i++) col = col * 26 + (m[1].charCodeAt(i) - 64);
    col -= 1;
    return Number(resolveFormula(row[col])) || 0;
  }
  function resolveFormula(val) {
    if (typeof val !== "string" || !val.startsWith("=")) return val;
    const expr = val.substring(1).replace(/([A-Z]+\d+)/gi, function(m){return resolveCellRef(m);});
    try { return Function('"use strict";return ('+expr+')')(); } catch(e) { return null; }
  }
  function col(name) {
    const idx = headers.indexOf(name);
    if (idx < 0) return "";
    const v = row[idx];
    if (v === null || v === undefined) return "";
    const r = resolveFormula(v);
    return (r !== null && r !== undefined) ? r : "";
  }

  const periodStr = formatPeriod(col("结算期间"));
  const host = String(col("承载企业（用电方）"));
  const address = String(col("地址"));
  const accountNo = String(col("发电户号"));
  const contact = String(col("联系人及电话"));
  const totalPower = Number(col("总用电量")) || 0;
  const gridPower = Number(col("上网电量")) || 0;
  const selfUse = Number(col("企业自用电量")) || 0;
  const price = Number(col("企业电价")) || 0;
  const fee = Number(col("企业电费")) || 0;
  const amtExTax = Math.round(fee / 1.13 * 100) / 100;
  const tax = Math.round((fee - amtExTax) * 100) / 100;
  const feeCn = numToCnUpper(fee);
  const payee = String(col("收款单位账户信息"));
  const payer = String(col("付款单位账户信息"));
  const issueDate = formatDate(col("编制日期"));
  const stampHtml = getStampHtml(col("印章图片"));
  function fm(n,d){return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}

  return '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n<title>光伏电费结算单</title>\n' +
'<style>\n' +
'  @page{size:A4;margin:15mm;}\n' +
'  body{font-family:"SimSun","宋体",serif;font-size:13px;color:#000;margin:0;padding:0;}\n' +
'  .container{max-width:190mm;margin:0 auto;}\n' +
'  h1{text-align:center;font-size:20px;margin:0 0 12px 0;letter-spacing:3px;}\n' +
'  .main-table{width:100%;border-collapse:collapse;margin:10px 0;}\n' +
'  .main-table th,.main-table td{border:1px solid #666;padding:6px 5px;font-size:12px;}\n' +
'  .main-table .thead{background-color:#D9E1F2;font-weight:bold;text-align:center;vertical-align:middle;}\n' +
'  .main-table td{vertical-align:middle;}\n' +
'  .text-center{text-align:center;}.text-right{text-align:right;}.text-left{text-align:left;}\n' +
'  .total-row{font-weight:bold;background-color:#F2F2F2;}\n' +
'  .account-info{font-size:12px;line-height:1.6;white-space:pre-line;}\n' +
'</style>\n</head>\n<body>\n<div class="container">\n' +
'  <h1>光伏电费结算单</h1>\n' +
'  <p>结算期间：'+periodStr+'</p>\n' +
'  <table class="main-table">\n' +
'    <tr><td class="text-center" style="width:18%"><strong>业主单位</strong></td><td style="width:32%">'+host+'</td><td class="text-center" style="width:18%"><strong>地址</strong></td><td style="width:32%">'+address+'</td></tr>\n' +
'    <tr><td class="text-center"><strong>发电户号</strong></td><td>'+accountNo+'</td><td class="text-center"><strong>联系人及电话</strong></td><td>'+contact+'</td></tr>\n' +
'    <tr class="thead"><td>计费项目</td><td>计费数量</td><td>单位</td><td>备注</td></tr>\n' +
'    <tr><td class="text-center">总发电量</td><td class="text-right">'+totalPower.toLocaleString("en-US")+'</td><td class="text-center">千瓦时</td><td>来自网上国网数据</td></tr>\n' +
'    <tr><td class="text-center">总上网结算电量</td><td class="text-right">'+gridPower.toLocaleString("en-US")+'</td><td class="text-center">千瓦时</td><td>来自网上国网数据</td></tr>\n' +
'    <tr><td class="text-center">总自用结算电量</td><td class="text-right">'+selfUse.toLocaleString("en-US")+'</td><td class="text-center">千瓦时</td><td>总发电量-总上网电量</td></tr>\n' +
'    <tr><td class="text-center">自用电折后电价</td><td class="text-right">'+price.toFixed(2)+'</td><td class="text-center">元</td><td>光伏电站能源管理协议价</td></tr>\n' +
'    <tr><td class="text-center"><strong>自用电折后电费</strong></td><td class="text-right"><strong>'+fm(fee,2)+'</strong></td><td class="text-center"><strong>元</strong></td><td></td></tr>\n' +
'    <tr><td class="text-center"><strong>税率</strong></td><td class="text-right"><strong>13</strong></td><td class="text-center"><strong>%</strong></td><td></td></tr>\n' +
'    <tr><td class="text-center"><strong>税额</strong></td><td class="text-right"><strong>'+fm(tax,2)+'</strong></td><td class="text-center"><strong>元</strong></td><td></td></tr>\n' +
'    <tr><td class="text-center"><strong>金额（不含税）</strong></td><td class="text-right"><strong>'+fm(amtExTax,2)+'</strong></td><td class="text-center"><strong>元</strong></td><td></td></tr>\n' +
'    <tr><td class="text-center"><strong>开票金额</strong></td><td class="text-right"><strong>'+fm(fee,2)+'</strong></td><td class="text-center"><strong>元</strong></td><td></td></tr>\n' +
'    <tr><td class="text-center"><strong>金额合计（大写）</strong></td><td class="text-center" colspan="3"><strong>'+feeCn+'</strong></td></tr>\n' +
'    <tr style="vertical-align:top;"><td colspan="2" class="account-info" style="vertical-align:top;"><span>收款单位账户信息：</span><br>'+payee+'</td><td colspan="2" class="account-info" style="vertical-align:top;"><span>付款单位账户信息：</span><br>'+payer+'</td></tr>\n' +
'    <tr><td colspan="4" class="text-left"><div><p>结算单校验（盖章）</p>'+stampHtml+'<p style="margin:0;padding:0;">编制人：胡慧珍    审核人：胡晓珍    编制日期：'+issueDate+'</p></div></td></tr>\n' +
'    <tr><td colspan="4" class="text-left" style="padding:0;"><div style="margin:0;padding:6px;"><p style="color:#F00;margin:0 0 20px 0;padding:0;">我们将通过微信、邮件等渠道发送给贵司。本表一式两份，若对上述信息存在异议，请于收到本单据之日起 3 个工作日内，以书面形式向我司提出；逾期未提出的，视为同意按上述信息进行电费结算。</p><p style="margin:0;padding:0;">联系人：胡慧珍    联系方式：18358808812    联系地址：浙江省杭州市萧山区临浦镇联东U谷南部智造产业港2幢8楼</p></div></td></tr>\n' +
'  </table>\n</div>\n</body>\n</html>';
}

// ==================== 渲染列表 ====================
var currentPage = 1;
var pageSize = 10;

function renderList() {
  var tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  if (allRows.length === 0) { tbody.innerHTML = '<tr><td colspan="8" class="empty">无数据</td></tr>'; document.getElementById("pagination").innerHTML = ""; return; }

  var totalPages = Math.ceil(allRows.length / pageSize);
  if (currentPage > totalPages) currentPage = totalPages;
  var start = (currentPage - 1) * pageSize;
  var end = Math.min(start + pageSize, allRows.length);

  for (var i = start; i < end; i++) {
    var item = allRows[i];
    var h = item.headers, r = item.row;
    function col(name) { const i = h.indexOf(name); return i >= 0 ? (r[i]||"") : ""; }

    // 解析公式
    function rf(v) {
      if (typeof v !== "string" || !v.startsWith("=")) return v;
      let expr = v.substring(1);
      expr = expr.replace(/([A-Z]+\d+)/gi, function(m) {
        m = m.toUpperCase();
        const mm = m.match(/^([A-Z]+)(\d+)$/);
        if (!mm) return "0";
        let c = 0;
        for (let i = 0; i < mm[1].length; i++) c = c * 26 + (mm[1].charCodeAt(i)-64);
        c -= 1;
        return Number(rf(r[c])) || 0;
      });
      try { return Function('"use strict";return ('+expr+')')(); } catch(e) { return null; }
    }
    function cv(name) { const i = h.indexOf(name); if(i<0) return ""; const v=r[i]; if(v===null||v===undefined) return ""; const rv=rf(v); return (rv!==null&&rv!==undefined)?rv:""; }

    const host = String(cv("承载企业（用电方）"));
    const project = String(cv("项目简称"));
    const period = String(cv("结算期间"));
    const periodDisplay = (function(v){
      var d = parseDate(v);
      return d ? d.getFullYear() + "-" + (d.getMonth()+1).toString().padStart(2,"0") : v;
    })(period);
    const price = Number(cv("企业电价")) || 0;
    const selfUse = Number(cv("企业自用电量")) || 0;
    const fee = Number(cv("企业电费")) || 0;
    const html = buildHtml(r, h);

    var tr = document.createElement("tr");
    tr.innerHTML =
      '<td>'+(i+1)+'</td>' +
      '<td>'+periodDisplay+'</td>' +
      '<td>'+host+'</td>' +
      '<td>'+project+'</td>' +
      '<td>'+price.toFixed(2)+'</td>' +
      '<td>'+selfUse.toLocaleString("en-US")+'</td>' +
      '<td><strong>¥'+fee.toLocaleString("en-US",{minimumFractionDigits:2})+'</strong></td>' +
      '<td class="actions">' +
        '<button class="btn-sm" data-idx="'+i+'">预览</button>' +
        '<button class="btn-sm" data-idx="'+i+'" data-action="excel">下载 Excel</button>' +
        '<button class="btn-sm" data-idx="'+i+'" data-action="pdf">下载 PDF</button>' +
      '</td>';

    tr.querySelector('[data-idx="'+i+'"]').onclick = function(){ openPreview(i, html); };
    tr.querySelector('[data-action="excel"]').onclick = function(){ downloadExcel(host, item.row, item.headers); };
    tr.querySelector('[data-action="pdf"]').onclick = function(){ downloadPdf(html, host); };
    tbody.appendChild(tr);
  }
  renderPagination();
}

function renderPagination() {
  var container = document.getElementById("pagination");
  var totalPages = Math.ceil(allRows.length / pageSize);
  if (totalPages <= 1) { container.innerHTML = ""; return; }

  var html = "";
  html += '<button class="btn-sm" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? "disabled" : "") + '>上一页</button>';
  html += '<span style="padding:0 10px;color:#666;">第 ' + currentPage + ' / ' + totalPages + ' 页（共 ' + allRows.length + ' 条）</span>';
  html += '<button class="btn-sm" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? "disabled" : "") + '>下一页</button>';

  // 页码按钮
  var maxButtons = 7;
  var startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
  var endPage = Math.min(totalPages, startPage + maxButtons - 1);
  if (endPage - startPage + 1 < maxButtons) startPage = Math.max(1, endPage - maxButtons + 1);

  for (var p = startPage; p <= endPage; p++) {
    var active = p === currentPage ? ' style="background:#1a73e8;color:#fff;font-weight:bold;"' : '';
    html += '<button class="btn-sm" onclick="goToPage(' + p + ')"' + active + '>' + p + '</button>';
  }

  container.innerHTML = html;
}

function goToPage(page) {
  var totalPages = Math.ceil(allRows.length / pageSize);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderList();
}

    return Number(resolveFormula(row[col])) || 0;

  function resolveFormula(val) {
    if (typeof val !== "string" || !val.startsWith("=")) return val;
    const expr = val.substring(1).replace(/([A-Z]+\d+)/gi, function(m){return resolveCellRef(m);});

    const idx = headers.indexOf(name);

function downloadExcel(name, row, headers) {
  const safe = name.replace(/[\\\/:*?"<>|]/g, "_");
  const blob = new Blob([buildExcelHtml(row, headers)], {type:"application/vnd.ms-excel;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "结算单_"+safe+".xls"; a.click();
  URL.revokeObjectURL(a.href);
}

function htmlToPdfBlob(html) {
  return new Promise(function(resolve, reject) {
    // 创建遮罩层，在可见区域渲染HTML以供html2canvas截图
    var overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:99999;background:#fff;overflow:auto;";

    var container = document.createElement("div");
    container.style.cssText = "width:210mm;margin:0 auto;padding:10mm;background:#fff;";
    container.innerHTML = html;
    overlay.appendChild(container);
    document.body.appendChild(overlay);

    // 等待字体和图片加载
    setTimeout(function() {
      html2pdf().set({
        margin: 0,
        filename: "",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { scale: 1.5, useCORS: true, backgroundColor: "#fff" },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
        pagebreak: { mode: ["css", "legacy"] }
      }).from(container).outputPdf("blob").then(function(blob) {
        document.body.removeChild(overlay);
        resolve(blob);
      }).catch(function(err) {
        document.body.removeChild(overlay);
        reject(err);
      });
    }, 300);
  });
}

function downloadPdf(html, name) {
  // 使用浏览器打印生成矢量PDF（清晰不模糊）
  var w = window.open("", "_blank", "width=900,height=700");
  w.document.write(html);
  w.document.close();
  setTimeout(function() {
    w.print();
    // 打印完成后自动关闭（部分浏览器支持）
    w.onafterprint = function() { w.close(); };
  }, 600);
}

function downloadAllExcel() {

    })());

let jsZipReady = null;
function loadJSZip() {
  if (typeof JSZip !== "undefined") return Promise.resolve();
  if (!jsZipReady) jsZipReady = new Promise(function(resolve, reject) {
    var s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  return jsZipReady;
}

function logMsg(msg) {
  var area = document.getElementById("logArea");
  area.style.display = "block";
  var now = new Date();
  var time = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0") + ":" + now.getSeconds().toString().padStart(2,"0");
  area.innerHTML += '<span style="color:#999;">[' + time + ']</span> ' + msg + '<br>';
  area.scrollTop = area.scrollHeight;
}

function downloadZip() {
  var btn = document.querySelector(".btn-success");
  var origText = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; }

  var logArea = document.getElementById("logArea");
  logArea.innerHTML = "";
  logArea.style.display = "block";

  var total = allRows.length;
  logMsg("开始生成，共 <b>" + total + "</b> 条记录");

  if (total === 0) {
    logMsg('<span style="color:red;">错误：没有数据！请先上传 Excel 文件。</span>');
    if (btn) { btn.textContent = origText; btn.disabled = false; }
    return;
  }

  // 显示进度提示
  var progress = document.createElement("div");
  progress.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999999;background:#fff;padding:24px 40px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.2);text-align:center;font-size:15px;";
  progress.innerHTML = '<p>正在生成 PDF...</p><p id="pdfProgress" style="font-size:13px;color:#999;margin-top:6px;"></p>';
  document.body.appendChild(progress);

  var completed = 0;

  loadJSZip().then(function() {
    logMsg("JSZip 加载完成，开始逐条生成 PDF...");
    var promises = allRows.map(function(item, idx) {
      var host = String((function(){
        var i = item.headers.indexOf("承载企业（用电方）");
        return i >= 0 ? (item.row[i]||"") : "";
      })());
      var periodRaw = (function(){
        var i = item.headers.indexOf("结算期间");
        if (i < 0) return "";
        var v = item.row[i];
        var d = parseDate(v);
        return d ? d.getFullYear() + "年" + (d.getMonth()+1).toString().padStart(2,"0") + "月" : String(v||"");
      })();
      var pdfName = "【结算单】" + host + periodRaw + "消纳结算单详情";
      return function() {
        document.getElementById("pdfProgress").textContent = (completed + 1) + " / " + total;
        logMsg("正在生成第 " + (idx + 1) + " 条：" + (host || "（无名称）"));
        return htmlToPdfBlob(buildHtml(item.row, item.headers)).then(function(blob) {
          completed++;
          document.getElementById("pdfProgress").textContent = completed + " / " + total;
          logMsg('第 ' + (idx + 1) + ' 条 <span style="color:#0d904f;">完成</span>（' + (blob ? (blob.size/1024).toFixed(0) + "KB" : "0KB") + '）');
          return { name: pdfName, blob: blob };
        });
      };
    });

    // 顺序执行（单条失败不影响其他）
    var results = [];
    var chain = Promise.resolve();
    promises.forEach(function(fn) {
      chain = chain.then(function() {
        return fn().then(function(r) { results.push(r); }).catch(function(e) {
          logMsg('<span style="color:#c62828;">第 ' + (results.length + 1) + ' 条失败：' + (e.message || e) + '</span>');
          completed++;
          document.getElementById("pdfProgress").textContent = completed + " / " + total + " (有跳过)";
        });
      });
    });
    return chain.then(function() { return results; });
  }).then(function(results) {
    var pdfCount = results.length;
    logMsg("PDF 生成完毕，成功 <b>" + pdfCount + "</b> / " + total + "，正在打包 ZIP...");
    var zip = new JSZip();
    results.forEach(function(r) {
      if (r.blob) {
        var safe = r.name.replace(/[\\\/:*?"<>|]/g, "_");
        zip.file(safe + ".pdf", r.blob);
      }
    });
    return zip.generateAsync({ type: "blob" }).then(function(blob) {
      return { blob: blob, count: pdfCount };
    });
  }).then(function(data) {
    document.body.removeChild(progress);
    var now = new Date();
    var ts = now.getFullYear().toString() +
      (now.getMonth()+1).toString().padStart(2,"0") +
      now.getDate().toString().padStart(2,"0") + "_" +
      now.getHours().toString().padStart(2,"0") +
      now.getMinutes().toString().padStart(2,"0") +
      now.getSeconds().toString().padStart(2,"0");
    var a = document.createElement("a");
    a.href = URL.createObjectURL(data.blob);
    a.download = "结算单_全部PDF_" + ts + ".zip";
    logMsg('<span style="color:#0d904f;font-weight:bold;">下载已触发！ZIP 包含 ' + data.count + ' 份 PDF</span>（文件名：结算单_全部PDF_' + ts + '.zip）');
    alert("已生成 " + data.count + " 份 PDF，请查看下载文件。\n\n→ 请打开最新下载的 ZIP 文件，不要打开旧的同名文件。");
    a.click();
    URL.revokeObjectURL(a.href);
  }).catch(function(e) {
    console.error("[downloadZip] 失败:", e);
    document.body.removeChild(progress);
    logMsg('<span style="color:#c62828;font-weight:bold;">批量生成失败：' + (e.message || e) + '</span>');
    alert("PDF批量生成失败，请尝试逐条下载。\n错误：" + e.message);
  }).finally(function() {
    if (btn) { btn.textContent = origText; btn.disabled = false; }
  });
}
